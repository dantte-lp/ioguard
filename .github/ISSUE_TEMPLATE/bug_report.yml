name: Bug Report
description: Report a bug in ringwall
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the form below.
        For security vulnerabilities, use [Security Advisories](https://github.com/dantte-lp/ringwall/security/advisories/new) instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior
      placeholder: |
        1. Configure ringwall with '...'
        2. Start the server
        3. Connect with '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (include error messages or logs)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Linux Distribution and Kernel Version
      placeholder: "e.g., Oracle Linux 10, kernel 6.12.0"
    validations:
      required: true

  - type: input
    id: compiler
    attributes:
      label: Compiler Version
      placeholder: "e.g., Clang 20.1.8 or GCC 14.3.1"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information (config snippets, core dumps, sanitizer output)
    validations:
      required: false
