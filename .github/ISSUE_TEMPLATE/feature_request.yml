name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement. Please describe the feature below.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've thought about
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of ioguard does this affect?
      options:
        - Core VPN (CSTP/DTLS/TUN)
        - Authentication (PAM/RADIUS/LDAP)
        - Security (seccomp/Landlock/nftables)
        - Storage (libmdbx/SQLite)
        - Build/CI
        - Documentation
        - CLI (iogctl)
        - Configuration
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information, links, or references
    validations:
      required: false
